[filters.pip]
description = "Compact pip output — strip download/cache/already-satisfied noise, keep result and errors"
match_command = "^pip3?\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Requirement already satisfied",
  "^Collecting ",
  "^\\s*Downloading ",
  "^\\s*Using cached ",
  "^\\s*\\|+.*\\| ",
  "^Installing collected packages",
  "^\\s*Preparing metadata",
  "^\\s*Building wheel",
]
max_lines = 60
on_empty = "pip: ok"

[[tests.pip]]
name = "keeps Successfully installed, strips fetch noise"
input = """
Collecting requests
  Downloading requests-2.31.0-py3-none-any.whl (62 kB)
Requirement already satisfied: idna in /usr/lib/python3
Installing collected packages: requests
Successfully installed requests-2.31.0
"""
expected = "Successfully installed requests-2.31.0"

[[tests.pip]]
name = "keeps ERROR lines"
input = """
Collecting nope
ERROR: Could not find a version that satisfies the requirement nope
ERROR: No matching distribution found for nope
"""
expected = """
ERROR: Could not find a version that satisfies the requirement nope
ERROR: No matching distribution found for nope
"""

[[tests.pip]]
name = "build failure keeps subprocess error details"
input = """
Collecting broken-package
  Using cached broken-package-1.0.0.tar.gz (12 kB)
  Preparing metadata (pyproject.toml) ... done
Building wheels for collected packages: broken-package
  Building wheel for broken-package (pyproject.toml) ... error
  error: subprocess-exited-with-error
  × Building wheel for broken-package did not run successfully.
  │ exit code: 1
ERROR: Failed building wheel for broken-package
"""
expected = """
  error: subprocess-exited-with-error
  × Building wheel for broken-package did not run successfully.
  │ exit code: 1
ERROR: Failed building wheel for broken-package
"""
