[filters.phpunit]
description = "Compact PHPUnit output — drop progress and blank lines while preserving failures, errors, and summaries"
match_command = "^(?:phpunit(?:\\.phar)?|php(?:\\s+(?:-n|-[dc]\\s+\\S+))*\\s+(?:\\S*/)?phpunit(?:\\.phar)?)(?:\\s|$)"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*[.FEWRDNIS]+\\s+\\d+\\s*/\\s*\\d+\\s*\\(\\s*\\d+%\\)\\s*$",
]
on_empty = "phpunit: no output"

[[tests.phpunit]]
name = "all-pass run drops progress and blank lines"
input = """
PHPUnit 12.2.0 by Sebastian Bergmann and contributors.

Runtime:       PHP 8.2.2

..                                                                  2 / 2 (100%)

Time: 00:00.077, Memory: 10.00 MB

OK (2 tests, 2 assertions)
"""
expected = """
PHPUnit 12.2.0 by Sebastian Bergmann and contributors.
Runtime:       PHP 8.2.2
Time: 00:00.077, Memory: 10.00 MB
OK (2 tests, 2 assertions)
"""

[[tests.phpunit]]
name = "failure run keeps diagnostics, stack trace, and summary"
input = """
