<style>
  :root {
    --bg: #08080B;
    --bg-card: #101014;
    --border: rgba(255,255,255,0.09);
    --border-hi: rgba(255,255,255,0.18);
    --ink: #F2F0EB;
    --text: #C9C7C1;
    --text-dim: #8A8884;
    --red: #D21C1C;
    --red-text: #FF5C4D;
    --sans: 'Space Grotesk', system-ui, sans-serif;
    --mono: 'Space Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    display: flex; flex-direction: column;
  }
  header {
    flex: none; display: flex; align-items: center; gap: 14px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
  }
  header img { width: 26px; height: 26px; }
  header h1 {
    font-size: 0.95rem; font-weight: 500; color: var(--ink);
    letter-spacing: 0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  header h1 .dim { color: var(--text-dim); font-weight: 400; }
  .actions { display: flex; gap: 10px; }
  header .actions { margin-left: auto; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.45rem;
    font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.06em;
    color: var(--text-dim); text-decoration: none;
    border: 1px solid var(--border-hi); border-radius: 6px;
    padding: 0.45rem 0.95rem; transition: color 0.18s, border-color 0.18s;
    white-space: nowrap;
  }
  .btn:hover { color: var(--ink); border-color: var(--ink); }
  .btn.primary { color: #fff; background: var(--red); border-color: var(--red); }
  .btn.primary:hover { background: #E23A2E; border-color: #E23A2E; }
  main { flex: 1; min-height: 0; }
  main object { display: block; width: 100%; height: 100%; border: 0; }
  .fallback {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    text-align: center; padding: 32px;
  }
  .fallback p { color: var(--text-dim); max-width: 46ch; line-height: 1.6; }
  @media (max-width: 640px) {
    header { padding: 10px 14px; }
    header h1 .dim { display: none; }
  }
</style>
</head>
<body>

<header>
  <img src="/_static/logo.png" alt="h5i logo">
  <h1>h5i Pitch Deck <span class="dim">· PDF version</span></h1>
  <nav class="actions">
    <a class="btn" href="../">Interactive deck</a>
    <a class="btn primary" href="../h5i-pitch-deck.pdf" download="h5i-pitch-deck.pdf">⬇ Download</a>
  </nav>
</header>

<main>
  <object data="../h5i-pitch-deck.pdf#view=FitH" type="application/pdf"
          aria-label="h5i pitch deck PDF, 13 slides">
    <div class="fallback">
      <p>Your browser does not display PDFs inline. Download the deck instead,
         or open the interactive version.</p>
      <div class="actions">
        <a class="btn primary" href="../h5i-pitch-deck.pdf" download="h5i-pitch-deck.pdf">⬇ Download the PDF</a>
        <a class="btn" href="../">Interactive deck</a>
      </div>
    </div>
  </object>
</main>

</body>
