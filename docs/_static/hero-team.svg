<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 132 1280 420" width="1280" height="420" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" role="img" aria-label="h5i team: one task fans out to claude and codex in sealed sandboxes; they peer-review each other in a continuous loop; a neutral verifier replays and tests every candidate; the one verified result is merged back into your repo.">
  <defs>
    <!-- backgrounds -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="55%" stop-color="#0b0f16"/>
      <stop offset="100%" stop-color="#0e1119"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="40%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#13e0c4" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#13e0c4" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#13e0c4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171d27"/>
      <stop offset="100%" stop-color="#0f141c"/>
    </linearGradient>

    <!-- accent strokes -->
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9d77"/>
      <stop offset="100%" stop-color="#ff6f52"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5cf0d6"/>
      <stop offset="100%" stop-color="#21c4ac"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6f52"/>
      <stop offset="100%" stop-color="#21c4ac"/>
    </linearGradient>
    <linearGradient id="loopGradR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#21c4ac"/>
      <stop offset="100%" stop-color="#ff6f52"/>
    </linearGradient>

    <!-- filters -->
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glowCoral" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff7a59" flood-opacity="0.9"/>
    </filter>
    <filter id="glowMint" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#34d8c0" flood-opacity="0.9"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#34d8c0" flood-opacity="0.25"/>
    </filter>

    <!-- arrow markers -->
    <marker id="aBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7aa2ff"/></marker>
    <marker id="aCoral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#ff7a59"/></marker>
    <marker id="aMint" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#2dd4bf"/></marker>
    <marker id="aViolet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#a78bfa"/></marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/></marker>

    <style>
      .mono   { font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
      .eyebrow{ fill:#2dd4bf; font-size:14px; font-weight:700; letter-spacing:0.22em; }
      .title  { fill:#f4f7fb; font-size:30px; font-weight:700; }
      .sub    { fill:#9aa7b6; font-size:15px; }
      .stage  { fill:#8a96a6; font-size:11px; font-weight:700; letter-spacing:0.18em; }
      .agent  { fill:#f4f7fb; font-size:21px; font-weight:700; }
      .meta   { fill:#8a96a6; font-size:12.5px; }
      .label  { fill:#e7edf4; font-size:16px; font-weight:700; }
      .small  { fill:#9aa7b6; font-size:12.5px; }
      .chip   { fill:#0a0e14; font-size:13px; font-weight:800; }
      .ok     { fill:#34d399; font-weight:800; }
      .no     { fill:#ff7a6b; font-weight:800; }
      .loopcap{ fill:#cfe9e3; font-size:12px; font-weight:700; letter-spacing:0.12em; }
    </style>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="600" fill="url(#bg)"/>
  <rect width="1280" height="600" fill="url(#centerGlow)"/>

  <!-- ============ CONNECTORS (drawn under the cards) ============ -->

  <!-- you -> sandboxes -->
  <path d="M214,332 L266,332" fill="none" stroke="#7aa2ff" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#aBlue)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.8s" repeatCount="indefinite"/>
  </path>

  <!-- claude -> verifier (curves over codex) -->
  <path d="M488,266 C610,196 752,196 838,286" fill="none" stroke="#ff7a59" stroke-width="2.5" stroke-opacity="0.85" stroke-dasharray="9 8" marker-end="url(#aCoral)">
    <animate attributeName="stroke-dashoffset" from="17" to="0" dur="1.0s" repeatCount="indefinite"/>
  </path>
  <!-- codex -> verifier -->
  <path d="M758,338 C792,338 808,332 836,332" fill="none" stroke="#2dd4bf" stroke-width="2.5" stroke-opacity="0.9" stroke-dasharray="9 8" marker-end="url(#aMint)">
    <animate attributeName="stroke-dashoffset" from="17" to="0" dur="1.0s" repeatCount="indefinite"/>
  </path>

  <!-- verifier -> result -->
  <path d="M1018,332 L1062,332" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#aViolet)">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.8s" repeatCount="indefinite"/>
  </path>

  <!-- result -> back to you (the return loop) -->
  <path d="M1150,398 C1150,536 132,536 132,372" fill="none" stroke="#34d399" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="3 9" stroke-linecap="round" marker-end="url(#aGreen)">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.3s" repeatCount="indefinite"/>
  </path>
  <text x="640" y="524" text-anchor="middle" class="small mono">merged into your repo · refs/h5i/*</text>

  <!-- ============ YOU ============ -->
  <g filter="url(#cardShadow)">
    <rect x="58" y="276" width="156" height="116" rx="18" fill="url(#panel)" stroke="#2a3340"/>
  </g>
  <g transform="translate(96 300)">
    <circle cx="20" cy="14" r="11" fill="none" stroke="#7aa2ff" stroke-width="2.5"/>
    <path d="M3,42 a17,17 0 0 1 34,0" fill="none" stroke="#7aa2ff" stroke-width="2.5"/>
  </g>
  <text x="158" y="318" class="label">you</text>
  <rect x="74" y="356" width="124" height="24" rx="12" fill="#2dd4bf"/>
  <text x="136" y="372" text-anchor="middle" class="mono chip">implement X</text>

  <!-- ============ SEALED SANDBOX FRAME ============ -->
  <rect x="258" y="158" width="468" height="320" rx="22" fill="#0c1018" fill-opacity="0.5" stroke="#283443" stroke-dasharray="2 8" stroke-width="1.5"/>
  <text x="282" y="186" class="mono stage">SEALED SANDBOXES · refs/h5i/env/*</text>

  <!-- claude card -->
  <g filter="url(#cardShadow)">
    <rect x="278" y="206" width="210" height="120" rx="16" fill="url(#panel)" stroke="url(#coral)" stroke-width="1.6"/>
  </g>
  <circle cx="306" cy="244" r="11" fill="none" stroke="url(#coral)" stroke-width="2.5"/>
  <circle cx="306" cy="244" r="4" fill="#ff7a59"/>
  <text x="326" y="250" class="agent">claude</text>
  <text x="302" y="284" class="meta">isolated env · own branch</text>
  <text x="302" y="304" class="meta mono">no peeking at codex</text>

  <!-- codex card -->
  <g filter="url(#cardShadow)">
    <rect x="496" y="332" width="210" height="120" rx="16" fill="url(#panel)" stroke="url(#mint)" stroke-width="1.6"/>
  </g>
  <circle cx="524" cy="370" r="11" fill="none" stroke="url(#mint)" stroke-width="2.5"/>
  <circle cx="524" cy="370" r="4" fill="#2dd4bf"/>
  <text x="544" y="376" class="agent">codex</text>
  <text x="520" y="410" class="meta">isolated env · own branch</text>
  <text x="520" y="430" class="meta mono">no peeking at claude</text>

  <!-- ============ PEER-REVIEW LOOP (the hero motion) ============ -->
  <!-- claude -> codex (top arc) -->
  <path id="arcTop" d="M488,250 C588,206 636,250 636,332" fill="none" stroke="url(#loopGrad)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="14 12" marker-end="url(#aMint)">
    <animate attributeName="stroke-dashoffset" from="26" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <!-- codex -> claude (bottom arc) -->
  <path id="arcBot" d="M496,408 C396,452 348,408 348,326" fill="none" stroke="url(#loopGradR)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="14 12" marker-end="url(#aCoral)">
    <animate attributeName="stroke-dashoffset" from="26" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>

  <!-- traveling light particles along each arc -->
  <circle r="5" fill="#7df5e0" filter="url(#glowMint)">
    <animateMotion dur="1.6s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#arcTop"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#ffb199" filter="url(#glowCoral)">
    <animateMotion dur="1.6s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#arcBot"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- review label badges riding the arcs -->
  <g transform="translate(636 256)">
    <rect x="-46" y="-13" width="92" height="26" rx="13" fill="#0c1018" stroke="#2dd4bf" stroke-opacity="0.7"/>
    <text x="-8" y="5" text-anchor="middle" class="small" fill="#9ff0df">reviews</text>
    <path d="M26,-4 l8,4 l-8,4" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(348 402)">
    <rect x="-46" y="-13" width="92" height="26" rx="13" fill="#0c1018" stroke="#ff7a59" stroke-opacity="0.7"/>
    <path d="M-26,-4 l-8,4 l8,4" fill="none" stroke="#ff7a59" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="8" y="5" text-anchor="middle" class="small" fill="#ffb199">reviews</text>
  </g>

  <!-- ============ VERIFIER ============ -->
  <g filter="url(#cardShadow)">
    <rect x="840" y="232" width="178" height="200" rx="20" fill="url(#panel)" stroke="#5b4b8a"/>
  </g>
  <text x="864" y="266" class="mono stage" fill="#b9a7ff">VERIFIER</text>
  <g transform="translate(858 284) scale(0.82)">
    <path d="M16,2 l22,8 v14 c0,15 -11,23 -22,28 c-11,-5 -22,-13 -22,-28 v-14 Z" fill="#1a1530" stroke="#a78bfa" stroke-width="2.2"/>
    <path d="M5,26 l7,7 l14,-17" fill="none" stroke="#a78bfa" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="898" y="306" class="label">neutral judge</text>
  <!-- checklist with drawn marks -->
  <g transform="translate(864 352)">
    <path d="M0,-4 l5,5 l9,-11" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="22" y="4" class="small">replays from base</text>
  </g>
  <g transform="translate(864 378)">
    <path d="M0,-4 l5,5 l9,-11" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="22" y="4" class="small">runs the tests itself</text>
  </g>
  <g transform="translate(864 404)">
    <path d="M0,-7 l11,11 M11,-7 l-11,11" fill="none" stroke="#ff7a6b" stroke-width="2.5" stroke-linecap="round"/>
    <text x="22" y="4" class="small">no agent self-certifies</text>
  </g>

  <!-- ============ RESULT ============ -->
  <g filter="url(#softGlow)">
    <rect x="1064" y="266" width="160" height="132" rx="20" fill="#0e1a16" stroke="url(#mint)" stroke-width="2"/>
  </g>
  <circle cx="1144" cy="312" r="26" fill="#34d399">
    <animate attributeName="r" values="25;27;25" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <path d="M1131,312 l9,10 l18,-22" fill="none" stroke="#0a0e14" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1144" y="362" text-anchor="middle" class="label">verified</text>
  <text x="1144" y="384" text-anchor="middle" class="small">high-quality output</text>

</svg>
