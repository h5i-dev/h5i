<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 580" width="1380" height="580" font-family="'Space Grotesk', Inter, system-ui, sans-serif" role="img" aria-label="h5i team overview: agent ensemble sends one task to isolated agents, compares their sealed submissions through peer review, verifies candidates neutrally, and applies one high-quality result.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071015"/>
      <stop offset="58%" stop-color="#0b0d13"/>
      <stop offset="100%" stop-color="#111018"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0f1319"/>
    </linearGradient>
    <linearGradient id="mintStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#62efd7"/>
      <stop offset="100%" stop-color="#57d68d"/>
    </linearGradient>
    <linearGradient id="violetStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ca7ff"/>
      <stop offset="100%" stop-color="#c08be8"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#62efd7" flood-opacity="0.26"/>
    </filter>
    <filter id="cardShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowMint" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#62efd7"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 7 7" refX="6" refY="3.5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#657080"/>
    </marker>
    <style>
      .mono { font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
      .eyebrow { fill: #62efd7; font-size: 14px; font-weight: 700; letter-spacing: 0.18em; }
      .title { fill: #f6f8fb; font-size: 31px; font-weight: 700; letter-spacing: 0; }
      .sub { fill: #a9b4c1; font-size: 15px; }
      .label { fill: #dfe6ee; font-size: 17px; font-weight: 700; letter-spacing: 0; }
      .small { fill: #8f9aa8; font-size: 13px; letter-spacing: 0; }
      .tiny { fill: #8f9aa8; font-size: 12px; letter-spacing: 0.04em; }
      .stage { fill: #aeb8c4; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; }
      .agent { fill: #f6f8fb; font-size: 20px; font-weight: 700; letter-spacing: 0; }
      .chipText { fill: #071015; font-size: 14px; font-weight: 800; letter-spacing: 0; }
      .reviewText { fill: #d7dcff; font-size: 14px; font-weight: 700; letter-spacing: 0; }
      .ok { fill: #57d68d; font-weight: 800; }
      .warn { fill: #ffb86c; font-weight: 800; }
      .adv { fill: #f4f7fa; font-size: 14px; font-weight: 700; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1380" height="580" fill="url(#bg)"/>
  <path d="M0,0 L1380,0 L1380,40 C1248,8 1172,34 1048,42 C884,53 732,21 560,44 C396,66 242,40 0,72 Z" fill="#62efd7" opacity="0.038"/>
  <path d="M0,507 C178,462 330,494 490,465 C654,436 804,494 984,463 C1148,435 1268,455 1380,425 L1380,580 L0,580 Z" fill="#c08be8" opacity="0.045"/>

  <text x="58" y="52" class="mono eyebrow">h5i team</text>
  <text x="58" y="91" class="title">Agent Ensemble: two heads are better than one.</text>
  <text x="58" y="119" class="sub">One task goes to isolated agents. They compare sealed work, then a neutral verifier applies the best passing result.</text>

  <g opacity="0.55">
    <path d="M270,311 C334,220 370,205 446,195" fill="none" stroke="#657080" stroke-width="2" marker-end="url(#arrowDim)"/>
    <path d="M270,311 C334,311 370,311 440,311" fill="none" stroke="#657080" stroke-width="2" marker-end="url(#arrowDim)"/>
    <path d="M270,311 C334,402 370,417 446,427" fill="none" stroke="#657080" stroke-width="2" marker-end="url(#arrowDim)"/>
  </g>
  <path d="M756,212 C785,212 796,294 825,294" fill="none" stroke="#62efd7" stroke-width="3" marker-end="url(#arrowMint)"/>
  <path d="M756,311 L825,311" fill="none" stroke="#657080" stroke-width="2" marker-end="url(#arrowDim)"/>
  <path d="M756,410 C785,410 796,328 825,328" fill="none" stroke="#657080" stroke-width="2" marker-end="url(#arrowDim)"/>
  <path d="M929,311 L974,311" fill="none" stroke="#62efd7" stroke-width="3" marker-end="url(#arrowMint)"/>
  <path d="M1149,311 C1180,311 1198,311 1228,311" fill="none" stroke="#62efd7" stroke-width="3" marker-end="url(#arrowMint)"/>

  <g filter="url(#cardShadow)">
    <rect x="58" y="237" width="212" height="148" rx="18" fill="url(#panel)" stroke="#2a323c"/>
    <text x="84" y="306" class="label">Task</text>
    <rect x="84" y="329" width="142" height="30" rx="15" fill="#62efd7"/>
    <text x="155" y="349" text-anchor="middle" class="mono chipText">Implement XXX</text>
  </g>

  <g>
    <text x="454" y="160" class="mono stage">SEALED AGENTS</text>
    <rect x="440" y="176" width="316" height="72" rx="16" fill="url(#panel)" stroke="url(#mintStroke)" stroke-width="1.5" filter="url(#softGlow)"/>
    <text x="464" y="207" class="agent">claude</text>
    <text x="464" y="230" class="small">isolated env · independent patch</text>
    <path d="M706,199 v-9 a12,12 0 0 1 24,0 v9" fill="none" stroke="#62efd7" stroke-width="2"/>
    <rect x="700" y="199" width="36" height="27" rx="7" fill="#12332f" stroke="#62efd7"/>

    <rect x="440" y="275" width="316" height="72" rx="16" fill="url(#panel)" stroke="#35404d"/>
    <text x="464" y="306" class="agent">codex</text>
    <text x="464" y="329" class="small">isolated env · independent patch</text>
    <path d="M706,298 v-9 a12,12 0 0 1 24,0 v9" fill="none" stroke="#8f9aa8" stroke-width="2"/>
    <rect x="700" y="298" width="36" height="27" rx="7" fill="#202733" stroke="#8f9aa8"/>

    <rect x="440" y="374" width="316" height="72" rx="16" fill="url(#panel)" stroke="#35404d"/>
    <text x="464" y="405" class="agent">cursor</text>
    <text x="464" y="428" class="small">isolated env · independent patch</text>
    <path d="M706,397 v-9 a12,12 0 0 1 24,0 v9" fill="none" stroke="#8f9aa8" stroke-width="2"/>
    <rect x="700" y="397" width="36" height="27" rx="7" fill="#202733" stroke="#8f9aa8"/>

    <rect x="825" y="278" width="104" height="66" rx="18" fill="#17162a" stroke="#9ca7ff"/>
    <text x="877" y="305" text-anchor="middle" class="reviewText">peer</text>
    <text x="877" y="326" text-anchor="middle" class="reviewText">review</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="974" y="217" width="175" height="188" rx="20" fill="url(#panel)" stroke="#38424e"/>
    <text x="1000" y="253" class="mono stage">VERIFY</text>
    <text x="1000" y="293" class="label">Neutral judge</text>
    <text x="1000" y="322" class="small"><tspan class="ok">✓</tspan> replay from base</text>
    <text x="1000" y="349" class="small"><tspan class="ok">✓</tspan> run declared tests</text>
    <text x="1000" y="376" class="small"><tspan class="warn">!</tspan> no agent self-certifies</text>
  </g>

  <g filter="url(#softGlow)">
    <rect x="1228" y="238" width="104" height="146" rx="24" fill="#0f1718" stroke="url(#mintStroke)" stroke-width="2"/>
    <circle cx="1280" cy="293" r="26" fill="#62efd7"/>
    <path d="M1268,293 l8,9 l17,-21" fill="none" stroke="#071015" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1280" y="344" text-anchor="middle" class="label">winner</text>
    <text x="1280" y="365" text-anchor="middle" class="small">applied</text>
  </g>

  <g transform="translate(58 493)">
    <rect x="0" y="0" width="1264" height="48" rx="18" fill="#10151b" stroke="#2a323c"/>
    <g transform="translate(26 0)">
      <circle cx="16" cy="24" r="8" fill="#62efd7"/>
      <text x="34" y="29" class="adv">more solution diversity</text>
      <circle cx="306" cy="24" r="8" fill="#9ca7ff"/>
      <text x="324" y="29" class="adv">review before merge</text>
      <circle cx="584" cy="24" r="8" fill="#ffb86c"/>
      <text x="602" y="29" class="adv">sandbox containment</text>
      <circle cx="884" cy="24" r="8" fill="#57d68d"/>
      <text x="902" y="29" class="adv">higher-quality output</text>
    </g>
  </g>
</svg>
