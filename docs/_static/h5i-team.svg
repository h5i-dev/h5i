<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 580" width="1380" height="580" font-family="'Space Grotesk', system-ui, sans-serif" role="img" aria-label="h5i team: one task is sent to several agents that each work in a sealed sandbox; the agents peer-review each other's sealed work; a neutral verifier replays each candidate and one verified result is applied.">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#42e2d0" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#42e2d0" stop-opacity="0"/>
    </radialGradient>
    <filter id="mintGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#42e2d0" flood-opacity="0.45"/>
    </filter>
    <marker id="arrowDim" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 z" fill="#3a424b"/>
    </marker>
    <marker id="arrowMint" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 z" fill="#42e2d0"/>
    </marker>
    <marker id="arrowSteel" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 z" fill="#a9bdd0"/>
    </marker>
    <style>
      .mono { font-family: 'Space Mono', ui-monospace, monospace; }
      .eyebrow { fill: #42e2d0; font-weight: 600; font-size: 14px; letter-spacing: 0.2em; }
      .title { fill: #f6f7f9; font-weight: 600; font-size: 26px; }
      .name { fill: #f6f7f9; font-weight: 600; font-size: 22px; }
      .chip { fill: #b48bd9; font-size: 14px; }
      .cap { fill: #8b95a3; font-size: 13px; letter-spacing: 0.02em; }
      .nodeLabel { fill: #cdd4dd; font-weight: 600; font-size: 15px; letter-spacing: 0.12em; }
      .gate { fill: #e8eaed; font-size: 16px; }
      .ok { fill: #5ee2a0; font-weight: 700; }
      .winLabel { fill: #f6f7f9; font-weight: 600; font-size: 20px; }
      .pill { fill: #04201d; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; }
      .peer { fill: #a9bdd0; font-weight: 600; font-size: 15px; letter-spacing: 0.04em; }
    </style>
  </defs>

  <!-- canvas -->
  <rect width="1380" height="580" fill="#0a0c10"/>
  <rect width="1380" height="580" fill="url(#bgGlow)"/>

  <!-- header -->
  <text x="64" y="48" class="mono eyebrow">h5i team</text>
  <text x="64" y="84" class="title">Many attempts in. One verified result out.</text>

  <!-- ── connectors (drawn first, nodes sit on top) ───────────────────────── -->
  <!-- task → both agents (the same task goes to each) -->
  <path d="M244,320 C 330,320 320,195 410,195" fill="none" stroke="#2a3138" stroke-width="1.8" marker-end="url(#arrowDim)"/>
  <path d="M244,320 C 330,320 320,445 410,445" fill="none" stroke="#2a3138" stroke-width="1.8" marker-end="url(#arrowDim)"/>

  <!-- agents → verifier (every candidate is verified); winning thread is mint -->
  <path d="M770,445 C 835,445 835,320 890,320" fill="none" stroke="#2a3138" stroke-width="1.8" marker-end="url(#arrowDim)"/>
  <path d="M770,195 C 835,195 835,320 890,320" fill="none" stroke="#42e2d0" stroke-width="2.8" marker-end="url(#arrowMint)"/>

  <!-- verifier → result -->
  <path d="M1100,320 L 1142,320" fill="none" stroke="#42e2d0" stroke-width="2.8" marker-end="url(#arrowMint)"/>

  <!-- peer review: the two agents review each other's sealed work (mutual) -->
  <path d="M590,262 L 590,378" fill="none" stroke="#a9bdd0" stroke-width="1.8" stroke-dasharray="5 4" marker-start="url(#arrowSteel)" marker-end="url(#arrowSteel)"/>

  <!-- ── TASK ─────────────────────────────────────────────────────────────── -->
  <rect x="64" y="265" width="180" height="110" rx="12" fill="#12161c" stroke="#2a3138"/>
  <text x="154" y="316" text-anchor="middle" class="mono nodeLabel">TASK</text>
  <text x="154" y="342" text-anchor="middle" class="mono cap">one change to make</text>

  <!-- ── AGENTS (each works alone, in a sealed sandbox) ───────────────────── -->
  <!-- claude — the winning attempt -->
  <g filter="url(#mintGlow)">
    <rect x="410" y="135" width="360" height="120" rx="12" fill="#12161c" stroke="#42e2d0" stroke-width="1.6"/>
  </g>
  <text x="436" y="186" class="name">claude</text>
  <rect x="436" y="200" width="96" height="24" rx="6" fill="#b48bd9" fill-opacity="0.16"/>
  <text x="450" y="217" class="mono chip">opus-4-8</text>
  <rect x="652" y="153" width="100" height="26" rx="13" fill="#42e2d0"/>
  <text x="702" y="171" text-anchor="middle" class="mono pill">WINNER</text>
  <text x="436" y="242" class="mono cap">works alone · sealed sandbox</text>

  <!-- codex -->
  <rect x="410" y="385" width="360" height="120" rx="12" fill="#12161c" stroke="#2a3138"/>
  <text x="436" y="436" class="name">codex</text>
  <rect x="436" y="450" width="118" height="24" rx="6" fill="#b48bd9" fill-opacity="0.16"/>
  <text x="450" y="467" class="mono chip">gpt-5-codex</text>
  <!-- lock = sealed -->
  <path d="M722,427 v-4 a6,6 0 0 1 12,0 v4" fill="none" stroke="#8b95a3" stroke-width="2"/>
  <rect x="719" y="427" width="18" height="14" rx="2.5" fill="#8b95a3"/>
  <text x="436" y="492" class="mono cap">works alone · sealed sandbox</text>

  <!-- peer-review label (sits on the mutual-review arrow) -->
  <rect x="500" y="293" width="180" height="38" rx="19" fill="#0e1217" stroke="#a9bdd0" stroke-width="1.4"/>
  <text x="590" y="318" text-anchor="middle" class="peer">⇅ peer review</text>

  <!-- ── NEUTRAL VERIFIER ─────────────────────────────────────────────────── -->
  <rect x="890" y="235" width="210" height="170" rx="14" fill="#12161c" stroke="#3a424b"/>
  <text x="995" y="276" text-anchor="middle" class="mono nodeLabel">NEUTRAL VERIFIER</text>
  <line x1="912" y1="290" x2="1078" y2="290" stroke="#2a3138"/>
  <text x="922" y="328" class="mono gate"><tspan class="ok">✓</tspan>  tests pass</text>
  <text x="922" y="358" class="mono gate"><tspan class="ok">✓</tspan>  applies clean</text>
  <text x="995" y="388" text-anchor="middle" class="cap">re-runs each candidate itself</text>

  <!-- ── ONE VERIFIED RESULT ──────────────────────────────────────────────── -->
  <g filter="url(#mintGlow)">
    <rect x="1142" y="260" width="192" height="120" rx="14" fill="#12161c" stroke="#42e2d0" stroke-width="1.6"/>
  </g>
  <text x="1238" y="312" text-anchor="middle" font-size="34" fill="#42e2d0">✓</text>
  <text x="1238" y="342" text-anchor="middle" class="winLabel">Verified result</text>
  <text x="1238" y="364" text-anchor="middle" class="mono cap">applied to your branch</text>

  <!-- footer: the team lifecycle, faint -->
  <text x="600" y="556" text-anchor="middle" class="mono cap">create &#8250; seal &#8250; review &#8250; verify &#8250; apply</text>
</svg>
