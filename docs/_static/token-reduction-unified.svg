<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="'Space Grotesk', system-ui, -apple-system, Segoe UI, sans-serif" role="img" aria-label="Many noisy, differently shaped tool outputs are unified by h5i capture run into one compact, structured ToolResult, using far fewer tokens.">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#D21C1C"/>
    </marker>
    <style>
      .mono { font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
      .cap  { letter-spacing: 2px; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect x="1" y="1" width="1038" height="558" rx="20" fill="#0d0d11" stroke="#26262e"/>
  <rect x="1" y="1" width="1038" height="558" rx="20" fill="url(#dots)"/>

  <!-- title -->
  <text x="520" y="52" text-anchor="middle" font-size="25" font-weight="600" fill="#ECECEC">One Structured Format for Every Tool</text>
  <text x="520" y="80" text-anchor="middle" font-size="14.5" fill="#8b8b97">many noisy tool outputs&#160;&#160;&#8594;&#160;&#160;one compact ToolResult&#160;&#160;&#8594;&#160;&#160;far fewer tokens</text>

  <!-- column captions -->
  <text x="182" y="128" text-anchor="middle" class="cap" font-size="11.5" fill="#7e7e8b">RAW&#160;OUTPUT</text>
  <text x="858" y="128" text-anchor="middle" class="cap" font-size="11.5" fill="#7e7e8b">UNIFIED&#160;RESULT</text>

  <!-- ============ INPUT CARDS (different shapes, lots of noise) ============ -->
  <!-- Card A: pytest (teal) -->
  <g>
    <rect x="56" y="150" width="252" height="112" rx="11" fill="#15151b" stroke="#2c2c35"/>
    <circle cx="76" cy="176" r="4.5" fill="#2dd4bf"/>
    <text x="89" y="180" class="mono" font-size="13" fill="#d7d7de">$ pytest -q</text>
    <rect x="72" y="196" width="196" height="7" rx="3.5" fill="#3a3a44"/>
    <rect x="72" y="210" width="168" height="7" rx="3.5" fill="#3a3a44"/>
    <rect x="72" y="224" width="150" height="7" rx="3.5" fill="#2dd4bf" opacity="0.85"/>
    <rect x="72" y="238" width="182" height="7" rx="3.5" fill="#3a3a44"/>
    <text x="292" y="249" text-anchor="end" class="mono" font-size="11.5" fill="#9a9aa6">1,424 tok</text>
  </g>
  <!-- Card B: cargo test (amber) -->
  <g>
    <rect x="56" y="286" width="252" height="112" rx="11" fill="#15151b" stroke="#2c2c35"/>
    <circle cx="76" cy="312" r="4.5" fill="#f0a020"/>
    <text x="89" y="316" class="mono" font-size="13" fill="#d7d7de">$ cargo test</text>
    <rect x="72" y="332" width="184" height="7" rx="3.5" fill="#3a3a44"/>
    <rect x="72" y="346" width="200" height="7" rx="3.5" fill="#3a3a44"/>
    <rect x="72" y="360" width="160" height="7" rx="3.5" fill="#f0a020" opacity="0.85"/>
    <rect x="72" y="374" width="176" height="7" rx="3.5" fill="#3a3a44"/>
    <text x="292" y="385" text-anchor="end" class="mono" font-size="11.5" fill="#9a9aa6">1,397 tok</text>
  </g>
  <!-- Card C: eslint (violet) -->
  <g>
    <rect x="56" y="422" width="252" height="112" rx="11" fill="#15151b" stroke="#2c2c35"/>
    <circle cx="76" cy="448" r="4.5" fill="#a78bfa"/>
    <text x="89" y="452" class="mono" font-size="13" fill="#d7d7de">$ eslint .</text>
    <rect x="72" y="468" width="170" height="7" rx="3.5" fill="#3a3a44"/>
    <rect x="72" y="482" width="150" height="7" rx="3.5" fill="#a78bfa" opacity="0.85"/>
    <rect x="72" y="496" width="192" height="7" rx="3.5" fill="#3a3a44"/>
    <rect x="72" y="510" width="164" height="7" rx="3.5" fill="#3a3a44"/>
    <text x="292" y="521" text-anchor="end" class="mono" font-size="11.5" fill="#9a9aa6">892 tok</text>
  </g>

  <!-- ============ converging "funnel" lines into the h5i chip ============ -->
  <g fill="none" stroke="#6f6f7e" stroke-width="2.2" opacity="0.9">
    <path d="M308 206 C 410 206, 430 340, 500 340"/>
    <path d="M308 342 C 420 342, 440 340, 500 340"/>
    <path d="M308 478 C 410 478, 430 340, 500 340"/>
  </g>

  <!-- h5i chip (the unifier) -->
  <g>
    <rect x="506" y="302" width="82" height="76" rx="16" fill="#1b1b22" stroke="#D21C1C" stroke-width="1.6" filter="url(#glow)"/>
    <text x="547" y="338" text-anchor="middle" font-size="20" font-weight="700" fill="#ECECEC">h5i</text>
    <text x="547" y="360" text-anchor="middle" class="mono" font-size="9.5" fill="#D21C1C">parse</text>
    <text x="547" y="400" text-anchor="middle" class="mono" font-size="11.5" fill="#8b8b97">capture run</text>
  </g>

  <!-- chip -> output arrow -->
  <path d="M592 340 L 690 340" fill="none" stroke="#D21C1C" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- ============ OUTPUT: one compact ToolResult ============ -->
  <g>
    <rect x="700" y="262" width="288" height="156" rx="12" fill="#14140f" stroke="#3fb95a" stroke-opacity="0.45"/>
    <!-- header -->
    <circle cx="722" cy="289" r="4.5" fill="#3fb95a"/>
    <text x="735" y="293" class="mono" font-size="13" fill="#e7e7ee">ToolResult</text>
    <text x="830" y="293" class="mono" font-size="13" fill="#6f6f7c">· one schema</text>
    <line x1="716" y1="304" x2="972" y2="304" stroke="#2c2c35"/>
    <!-- body (the structured fields) -->
    <text x="716" y="326" class="mono" font-size="12.5" fill="#7e8b7a">tool:</text>
    <text x="762" y="326" class="mono" font-size="12.5" fill="#cdd6c8">pytest</text>
    <text x="716" y="346" class="mono" font-size="12.5" fill="#7e8b7a">status:</text>
    <text x="784" y="346" class="mono" font-size="12.5" fill="#ff6a6a" font-weight="700">failed</text>
    <text x="716" y="366" class="mono" font-size="12.5" fill="#7e8b7a">findings:</text>
    <text x="730" y="385" class="mono" font-size="12" fill="#b9c2b4">tests/t.py:42  assert 0 == 100</text>
    <!-- footnote: same shape for every tool -->
    <text x="716" y="406" font-size="11" fill="#6f6f7c">same shape for cargo · eslint · tsc · ruff · mypy · go</text>
  </g>

  <!-- token-savings badge on the output -->
  <g>
    <rect x="820" y="430" width="168" height="30" rx="15" fill="#11210f" stroke="#3fb95a" stroke-opacity="0.55"/>
    <text x="904" y="450" text-anchor="middle" class="mono" font-size="13" fill="#7fe39a">47 tok&#160;&#160;·&#160;&#160;95% &#8595;</text>
  </g>

  <!-- raw-recoverable footnote (honesty) -->
  <text x="700" y="450" font-size="11" fill="#6f6f7c">raw kept out-of-band,</text>
  <text x="700" y="464" font-size="11" fill="#6f6f7c">recoverable on demand</text>
</svg>
