name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    # Run on PRs against any base branch so feature branches get checked.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Git user for tests
        # Required because some tests perform real Git operations
        # (commit / blame / log) and libgit2 needs author + committer.
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          # NB: rustfmt enforcement deferred — codebase is not yet fmt-clean.
          # See https://github.com/h5i-dev/h5i/issues for the cleanup tracker.

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --verbose --all-targets

      - name: cargo test
        run: cargo test --verbose

  # The man page (man/man1/h5i.1) and the /manual/ HTML (docs/manual/index.html)
  # are GENERATED, not hand-edited: the man page from the clap CLI via
  # `scripts/gen_man.sh`, the HTML from MANUAL.md via `scripts/gen_manual.py`.
  # This job regenerates both and fails if the committed copies drift, so a
  # change to the CLI flags or to MANUAL.md can never land with a stale manual.
  # Reproducibility: the man page is pinned by Cargo.lock (`--locked` build) +
  # toolchain; the HTML is pinned by `scripts/requirements.txt` (the `markdown`
  # version). Regenerate locally on Linux with the same pins and commit the diff.
  docs:
    name: manuals fresh (man + html)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # rust-embed's `#[folder = "web/dist/"]` must resolve at derive time, but
      # the man page derives only from the clap command tree — web/dist contents
      # don't affect it. Keep DEFAULT features on (so `serve` and other
      # web-gated subcommands appear, matching the committed page), stub the
      # bundle, and skip the npm build (no Node on this runner).
      - name: Stub web/dist for rust-embed
        run: |
          mkdir -p web/dist
          echo '<!doctype html><title>stub</title>' > web/dist/index.html

      - name: Install manual-generator deps (pinned)
        run: python3 -m pip install --quiet -r scripts/requirements.txt

      - name: Regenerate the man page (from the clap CLI)
        env:
          H5I_SKIP_WEB_BUILD: '1'
        run: ./scripts/gen_man.sh

      - name: Regenerate the /manual/ HTML (from MANUAL.md)
        run: python3 scripts/gen_manual.py

      - name: Fail if the committed manuals are stale
        run: |
          if git diff --quiet -- man/man1/h5i.1 docs/manual/index.html; then
            echo "manuals are up to date"
            exit 0
          fi
          echo "::error::Generated manuals are out of date — a source change landed without regenerating."
          echo "Run on Linux, then commit the result:"
          echo "    ./scripts/gen_man.sh"
          echo "    python3 -m pip install -r scripts/requirements.txt && python3 scripts/gen_manual.py"
          echo "    git add man/man1/h5i.1 docs/manual/index.html"
          echo "----------------------------- drift -----------------------------"
          git --no-pager diff -- man/man1/h5i.1 docs/manual/index.html
          exit 1

  # Compile-check every release target on PRs/main so cross-target breakage
  # (musl-vs-glibc libc cfg, arch-specific syscall consts, `target_os` gaps) is
  # caught BEFORE a tag is cut — not in `release.yaml`, which only runs on tags.
  # `cargo check` (not a full build) is enough: every such failure is a
  # front-end compile/type/cfg error. Keep this matrix in sync with
  # `release.yaml`'s build matrix.
  cross-check:
    name: cross-check ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Compile-only gate: we don't need the real React bundle, only a `web/dist/`
      # so rust-embed's `#[folder = "web/dist/"]` resolves at derive time. Stub it
      # and skip the npm build (H5I_SKIP_WEB_BUILD=1) — much cheaper than Node on
      # every runner, and the bundle is irrelevant to whether the crate compiles.
      - name: Stub web/dist for rust-embed
        shell: bash
        run: |
          mkdir -p web/dist
          echo '<!doctype html><title>stub</title>' > web/dist/index.html

      # musl linker/compiler for the native musl target; OpenSSL is vendored.
      - name: Install musl-tools (Linux, native)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: cargo check (native)
        if: "!matrix.use_cross"
        env:
          H5I_SKIP_WEB_BUILD: '1'
        run: cargo check --locked --target ${{ matrix.target }}

      - name: cross check (container)
        if: matrix.use_cross
        env:
          H5I_SKIP_WEB_BUILD: '1'
          # Forward both into cross's Docker container (no Node there → skip web
          # build; keep the `-D warnings` RUSTFLAGS from the workflow env).
          CROSS_CONTAINER_OPTS: '-e H5I_SKIP_WEB_BUILD -e RUSTFLAGS'
        run: cross check --locked --target ${{ matrix.target }}
